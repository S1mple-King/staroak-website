services:
  staroak-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: staroak-website:3.4
    container_name: staroak-web-preview
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
