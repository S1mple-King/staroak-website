<?xml version="1.0" encoding="UTF-8"?>
<!--
  StarOak favicon — vector source (placeholder rebuild)
  Single-color, square viewBox; lead star + oak cross silhouette.
  Suitable for browser tabs and modern favicon contexts that accept SVG.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="StarOak">
  <defs>
    <linearGradient id="favBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3EFE7"/>
      <stop offset="60%" stop-color="#D9DCE1"/>
      <stop offset="100%" stop-color="#9EA3AD"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="10" fill="#050914"/>

  <!-- Compact sovereign-orbit arc -->
  <ellipse cx="38" cy="30" rx="20" ry="6.5" fill="none"
           stroke="#D5B36E" stroke-width="0.8" opacity="0.85"/>

  <!-- Lead star -->
  <g transform="translate(38 18)">
    <circle r="6" fill="#F3EFE7"/>
    <path d="M 0,-9 L 1.2,-1.5 L 9,0 L 1.2,1.5 L 0,9 L -1.2,1.5 L -9,0 L -1.2,-1.5 Z"
          fill="#FFFFFF"/>
  </g>

  <!-- Oak cross: simplified to two short tapered strokes -->
  <g fill="url(#favBody)" stroke="#9F8450" stroke-width="0.6">
    <path d="M 14,46 C 19,38 27,33 38,30 C 31,33 25,38 20,46 C 18,49 16,49 14,46 Z"/>
    <path d="M 24,46 C 30,38 38,33 50,30 C 42,33 35,38 30,46 C 28,49 26,49 24,46 Z"/>
  </g>
</svg>
